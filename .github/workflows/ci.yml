name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Mintokei.slnx
      - name: Build
        run: dotnet build Mintokei.slnx -c Release --no-restore
      - name: Test
        run: dotnet test Mintokei.slnx -c Release --no-build
      - name: Pack
        run: dotnet pack Mintokei.slnx -c Release --no-build -o "${{ github.workspace }}/nupkgs"
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: |
            nupkgs/*.nupkg
            nupkgs/*.snupkg
